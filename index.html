<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas — Live Weather</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --ink: #080D18;
            --panel: #111A2C;
            --panel-2: #17223A;
            --panel-3: #1D2B47;
            --border: rgba(141, 163, 196, 0.14);
            --border-2: rgba(141, 163, 196, 0.24);
            --mist: #8DA3C4;
            --mist-dim: #5C7096;
            --frost: #EEF4FF;
            --halo: #F5C97B;
            --halo-dim: #B78F52;
            --cyan: #5FD0E8;
            --danger: #E5766B;
            --radius-lg: 22px;
            --radius-md: 16px;
            --radius-sm: 10px;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
            --ease: cubic-bezier(.22, 1, .36, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            background: var(--ink);
            color: var(--frost);
            font-family: var(--font-body);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        ::selection {
            background: var(--halo);
            color: var(--ink);
        }

        a {
            color: inherit;
        }

        button {
            font-family: inherit;
            cursor: pointer;
        }

        ::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--panel-3);
            border-radius: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.001ms !important;
                transition-duration: 0.001ms !important;
            }
        }

        .app {
            max-width: 1180px;
            margin: 0 auto;
            padding: 28px 24px 80px;
            position: relative;
            z-index: 1;
        }

        /* ---------- HEADER ---------- */
        header.top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 34px;
            flex-wrap: wrap;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: 0.02em;
        }

        .brand .mark {
            width: 34px;
            height: 34px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            position: relative;
            overflow: hidden;
            transition: all 0.4s var(--ease);
        }

        .brand:hover .mark {
            border-color: rgba(245, 201, 123, 0.6);
            background: rgba(245, 201, 123, 0.08);
            transform: rotate(90deg);
            box-shadow: 0 0 12px rgba(245, 201, 123, 0.25);
        }

        .brand .mark svg {
            width: 20px;
            height: 20px;
            display: block;
            transition: transform 0.4s var(--ease);
        }

        .brand:hover .mark svg {
            transform: scale(1.1);
        }

        .brand small {
            display: block;
            font-family: var(--font-mono);
            font-weight: 400;
            font-size: 0.62rem;
            letter-spacing: 0.14em;
            color: var(--mist-dim);
            text-transform: uppercase;
            margin-top: 1px;
        }

        .searchwrap {
            position: relative;
            flex: 1;
            max-width: 420px;
            min-width: 240px;
        }

        .searchbox {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 11px 16px;
            transition: border-color .25s var(--ease), background .25s var(--ease);
        }

        .searchbox:focus-within {
            border-color: var(--border-2);
            background: var(--panel-2);
        }

        .searchbox svg {
            width: 16px;
            height: 16px;
            color: var(--mist-dim);
            flex-shrink: 0;
        }

        .searchbox input {
            background: none;
            border: none;
            outline: none;
            color: var(--frost);
            font-family: var(--font-body);
            font-size: 0.88rem;
            width: 100%;
        }

        .searchbox input::placeholder {
            color: var(--mist-dim);
        }

        .geobtn {
            background: none;
            border: none;
            color: var(--mist);
            display: grid;
            place-items: center;
            padding: 2px;
            border-radius: 6px;
            transition: color .2s;
        }

        .geobtn:hover {
            color: var(--halo);
        }

        .geobtn svg {
            width: 16px;
            height: 16px;
        }

        .suggest {
            position: absolute;
            top: calc(100% + 10px);
            left: -40px;
            right: -40px;
            background: rgba(17, 26, 44, 0.92);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid rgba(141, 163, 196, 0.18);
            border-radius: 20px;
            overflow: hidden;
            z-index: 40;
            box-shadow: 0 24px 64px -16px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
            display: none;
            padding: 8px;
            max-height: 420px;
            overflow-y: auto;
        }

        .suggest.open {
            display: block;
            animation: suggestSlideIn 0.3s var(--ease);
        }

        @keyframes suggestSlideIn {
            from {
                opacity: 0;
                transform: translateY(-8px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .suggest-item {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
            text-align: left;
            background: transparent;
            border: none;
            color: var(--frost);
            padding: 10px 12px;
            font-size: 0.84rem;
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.25s var(--ease), transform 0.2s var(--ease);
            position: relative;
            overflow: hidden;
        }

        .suggest-item:hover {
            background: rgba(141, 163, 196, 0.1);
            transform: scale(1.01);
        }

        .suggest-item:active {
            transform: scale(0.98);
        }

        .suggest-item .s-thumb {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            overflow: hidden;
            flex-shrink: 0;
            background: var(--panel-3);
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .suggest-item .s-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .suggest-item .s-thumb img.loaded {
            opacity: 1;
        }

        .suggest-item .s-thumb .s-thumb-placeholder {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            color: var(--mist-dim);
        }

        .suggest-item .s-thumb .s-thumb-placeholder svg {
            width: 20px;
            height: 20px;
        }

        .suggest-item .s-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .suggest-item .s-city {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.92rem;
            color: var(--frost);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .suggest-item .s-region {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            color: var(--mist-dim);
            letter-spacing: 0.03em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .suggest-item .s-country {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: var(--font-mono);
            font-size: 0.62rem;
            color: var(--mist);
            background: rgba(141, 163, 196, 0.1);
            padding: 3px 8px;
            border-radius: 6px;
            width: fit-content;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .suggest-item .s-arrow {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: rgba(141, 163, 196, 0.08);
            display: grid;
            place-items: center;
            color: var(--mist-dim);
            transition: all 0.25s var(--ease);
        }

        .suggest-item:hover .s-arrow {
            background: rgba(245, 201, 123, 0.15);
            color: var(--halo);
            transform: translateX(2px);
        }

        .suggest-item .s-arrow svg {
            width: 14px;
            height: 14px;
        }

        .suggest-divider {
            height: 1px;
            background: var(--border);
            margin: 2px 12px;
        }

        .unit-toggle {
            display: flex;
            border: 1px solid var(--border);
            border-radius: 100px;
            overflow: hidden;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            flex-shrink: 0;
        }

        .unit-toggle button {
            background: none;
            border: none;
            color: var(--mist-dim);
            padding: 9px 14px;
            transition: all .2s;
        }

        .unit-toggle button.active {
            background: var(--panel-3);
            color: var(--halo);
        }

        /* ---------- HERO ---------- */
        .hero {
            position: relative;
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: #080D18;
            min-height: 420px;
            padding: 38px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .hero-bg-underlay {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: 0;
            opacity: 0;
            pointer-events: none;
        }

        .hero canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .hero .scrim {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(8, 13, 24, 0.05) 0%, rgba(8, 13, 24, 0.45) 60%, rgba(8, 13, 24, 0.8) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 3;
        }

        .hero-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            flex-wrap: wrap;
        }

        .loc-block .loc-name {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .loc-block .loc-meta {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--mist);
            margin-top: 4px;
            letter-spacing: 0.03em;
        }

        .aqi-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(8, 13, 24, 0.45);
            border: 1px solid var(--border-2);
            backdrop-filter: blur(6px);
            padding: 8px 14px;
            border-radius: 100px;
            font-family: var(--font-mono);
            font-size: 0.72rem;
        }

        .aqi-pill .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .hero-mid {
            display: flex;
            align-items: flex-end;
            gap: 28px;
            margin: 26px 0 6px;
            flex-wrap: wrap;
        }

        .temp-display {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: clamp(4.2rem, 11vw, 7.2rem);
            line-height: 0.85;
            letter-spacing: -0.02em;
            display: flex;
            align-items: flex-start;
        }

        .temp-display .deg {
            font-size: 0.4em;
            font-weight: 500;
            margin-top: 0.12em;
        }

        .cond-block {
            padding-bottom: 0.6rem;
        }

        .cond-block .cond-text {
            font-size: 1.15rem;
            font-weight: 500;
            font-family: var(--font-display);
        }

        .cond-block .cond-range {
            font-family: var(--font-mono);
            color: var(--mist);
            font-size: 0.8rem;
            margin-top: 4px;
        }

        .cond-block .cond-range .hi {
            color: var(--halo);
        }

        .cond-block .cond-range .lo {
            color: var(--cyan);
        }

        .hero-bottom {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .quickchip {
            display: flex;
            align-items: center;
            gap: 7px;
            background: rgba(8, 13, 24, 0.4);
            border: 1px solid var(--border);
            backdrop-filter: blur(6px);
            padding: 8px 13px;
            border-radius: 100px;
            font-family: var(--font-mono);
            font-size: 0.71rem;
            color: var(--mist);
        }

        .quickchip svg {
            width: 13px;
            height: 13px;
            color: var(--halo);
        }

        .quickchip b {
            color: var(--frost);
            font-weight: 500;
        }

        /* ---------- SECTION LABEL ---------- */
        .section-label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 38px 0 14px;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--mist-dim);
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ---------- HOURLY ---------- */
        .hourly-strip {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 8px;
            scroll-snap-type: x proximity;
        }

        .hour-card {
            scroll-snap-align: start;
            flex: 0 0 auto;
            width: 84px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: transform .35s var(--ease), border-color .3s;
        }

        .hour-card:hover {
            border-color: var(--border-2);
        }

        .hour-card .h-time {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            color: var(--mist-dim);
        }

        .hour-card .h-icon {
            width: 32px;
            height: 32px;
        }

        .hour-card .h-temp {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 1.05rem;
        }

        .hour-card .h-rain {
            font-family: var(--font-mono);
            font-size: 0.63rem;
            color: var(--cyan);
        }

        /* ---------- GRID: details + daily ---------- */
        .split {
            display: grid;
            grid-template-columns: 1.15fr 1fr;
            gap: 20px;
            align-items: start;
        }

        @media (max-width:880px) {
            .split {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 22px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .gauge-card {
            background: var(--panel-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .gauge-card .g-label {
            display: flex;
            align-items: center;
            gap: 7px;
            font-family: var(--font-mono);
            font-size: 0.68rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--mist-dim);
        }

        .gauge-card .g-label svg {
            width: 13px;
            height: 13px;
            color: var(--halo);
        }

        .gauge-card .g-value {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 1.5rem;
        }

        .gauge-card .g-value span {
            font-size: 0.55em;
            color: var(--mist);
            font-weight: 400;
        }

        .gauge-card .g-sub {
            font-size: 0.72rem;
            color: var(--mist-dim);
        }

        .bar-track {
            height: 5px;
            border-radius: 4px;
            background: var(--panel-3);
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 4px;
            width: 0%;
            background: var(--halo);
        }

        .wind-compass {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 1px solid var(--border-2);
            position: relative;
            margin: 2px auto 0;
            flex-shrink: 0;
        }

        .wind-compass .needle {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 2px;
            height: 20px;
            background: linear-gradient(180deg, var(--cyan), transparent);
            transform-origin: 50% 100%;
            margin-left: -1px;
            margin-top: -20px;
            border-radius: 2px;
        }

        .wind-row {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .daily-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .day-row {
            display: grid;
            grid-template-columns: 78px 30px 1fr 74px;
            align-items: center;
            gap: 12px;
            padding: 12px 4px;
            border-bottom: 1px solid var(--border);
        }

        .day-row:last-child {
            border-bottom: none;
        }

        .day-row .d-name {
            font-family: var(--font-mono);
            font-size: 0.76rem;
            color: var(--mist);
        }

        .day-row .d-name b {
            color: var(--frost);
            display: block;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 0.86rem;
        }

        .day-row .d-icon {
            width: 24px;
            height: 24px;
        }

        .day-range {
            position: relative;
            height: 4px;
            border-radius: 4px;
            background: var(--panel-3);
            overflow: hidden;
        }

        .day-range i {
            position: absolute;
            top: 0;
            bottom: 0;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--cyan), var(--halo));
            width: 0%;
        }

        .day-row .d-temps {
            font-family: var(--font-mono);
            font-size: 0.78rem;
            text-align: right;
            white-space: nowrap;
        }

        .day-row .d-temps .hi {
            color: var(--frost);
            font-weight: 500;
        }

        .day-row .d-temps .lo {
            color: var(--mist-dim);
        }

        footer {
            margin-top: 50px;
            text-align: center;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--mist-dim);
        }

        footer a {
            color: var(--mist);
            text-decoration: none;
            border-bottom: 1px dotted var(--mist-dim);
        }

        .state-msg {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--panel-3);
            border: 1px solid var(--border-2);
            padding: 10px 18px;
            border-radius: 100px;
            font-family: var(--font-mono);
            font-size: 0.76rem;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
        }

        .state-msg.err {
            color: var(--danger);
            border-color: rgba(229, 118, 107, 0.4);
        }

        .skeleton {
            opacity: 0.35;
            filter: blur(1px);
        }
    </style>
</head>

<body>

    <div class="state-msg" id="stateMsg"></div>

    <div class="app">
        <header class="top">
            <div class="brand">
                <span class="mark">
                    <svg viewBox="0 0 24 24" fill="none">
                        <!-- Concentric thin circle (instrument gauge look) -->
                        <circle cx="12" cy="12" r="10" stroke="var(--mist)" stroke-width="0.8" stroke-dasharray="2 1.5"
                            opacity="0.6" />
                        <circle cx="12" cy="12" r="7" stroke="var(--frost)" stroke-width="1.2" opacity="0.8" />
                        <!-- Cardinal ticks -->
                        <line x1="12" y1="2" x2="12" y2="4.5" stroke="var(--halo)" stroke-width="1.6"
                            stroke-linecap="round" />
                        <line x1="12" y1="19.5" x2="12" y2="22" stroke="var(--cyan)" stroke-width="1.6"
                            stroke-linecap="round" />
                        <line x1="2" y1="12" x2="4.5" y2="12" stroke="var(--mist-dim)" stroke-width="1.2"
                            stroke-linecap="round" />
                        <line x1="19.5" y1="12" x2="22" y2="12" stroke="var(--mist-dim)" stroke-width="1.2"
                            stroke-linecap="round" />
                        <!-- Coordinate lines (Atlas theme) -->
                        <path d="M5.5 8.5c3 1.5 10 1.5 13 0" stroke="var(--mist-dim)" stroke-width="0.8"
                            opacity="0.5" />
                        <path d="M5.5 15.5c3-1.5 10-1.5 13 0" stroke="var(--mist-dim)" stroke-width="0.8"
                            opacity="0.5" />
                        <!-- Rotating Compass pointer / needles -->
                        <path d="M12 5.5l1.8 6.5h-3.6z" fill="var(--halo)" />
                        <path d="M12 18.5l1.2-6.5h-2.4z" fill="var(--cyan)" opacity="0.85" />
                        <!-- Central pivot -->
                        <circle cx="12" cy="12" r="1.8" fill="var(--frost)" />
                    </svg>
                </span>
                <div>
                    ATLAS
                    <small>live weather instrument</small>
                </div>
            </div>

            <div class="searchwrap">
                <div class="searchbox">
                    <svg viewBox="0 0 24 24" fill="none">
                        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" />
                        <path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                    <input id="searchInput" type="text" placeholder="Search any city or place…" autocomplete="off">
                    <button class="geobtn" id="geoBtn" title="Use my location">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" />
                            <circle cx="12" cy="12" r="6" stroke="currentColor" stroke-width="2" />
                            <circle cx="12" cy="12" r="1.5" fill="currentColor" />
                        </svg>
                    </button>

            </div>

            <div class="unit-toggle" id="unitToggle">
                <button class="active" data-unit="c">°C</button>
                <button data-unit="f">°F</button>
            </div>
        </header>

        <section class="hero" id="hero">
            <div class="hero-bg-underlay" id="heroBg1"></div>
            <div class="hero-bg-underlay" id="heroBg2" style="opacity:0;"></div>
            <canvas id="skyCanvas"></canvas>
            <div class="scrim"></div>
            <div class="hero-content">
                <div class="hero-top">
                    <div class="loc-block">
                        <div class="loc-name" id="locName">—</div>

                <div class="hero-mid">
                    <div class="temp-display"><span id="tempMain">--</span><span class="deg">°</span></div>
                    <div class="cond-block">

                            <span class="hi" id="hiTemp">H --°</span> &nbsp;·&nbsp;

        <div class="section-label">Next 24 hours</div>
        <div class="hourly-strip" id="hourlyStrip"></div>

        <div class="section-label">Details &amp; outlook</div>
        <div class="split">
            <div class="card">
                <div class="detail-grid" id="detailGrid"></div>
            </div>
            <div class="card">
                <div class="daily-list" id="dailyList"></div>
            </div>
        </div>

        <footer>
            Weather data provided by <a href="https://www.Araam-dev.vercel.app" target="_blank"
                rel="noopener">Araam-dev.vercel.app</a>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        (function () {
            "use strict";

            const API_KEY = "5334550b48dc4738b19133937262107";
            const BASE = "https://api.weatherapi.com/v1";
            let unit = "c"; // c or f
            let currentData = null;
            let particleState = null;
            let rafId = null;

            const $ = (sel) => document.querySelector(sel);
            const stateMsg = $("#stateMsg");

            function flash(msg, isErr) {
                stateMsg.textContent = msg;
                stateMsg.classList.toggle("err", !!isErr);
                gsap.killTweensOf(stateMsg);
                gsap.timeline()
                    .set(stateMsg, { y: -10, opacity: 0 })
                    .to(stateMsg, { y: 0, opacity: 1, duration: .35, ease: "power2.out" })
                    .to(stateMsg, { opacity: 0, duration: .4, delay: 1.6, ease: "power2.in" });
            }

            /* ---------------- ICONS (weather condition -> inline svg) ---------------- */
            function iconFor(code, isDay) {
                const sun = `<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4.5" fill="#F5C97B"/><g stroke="#F5C97B" stroke-width="1.6" stroke-linecap="round"><path d="M12 2.5v2.2M12 19.3v2.2M21.5 12h-2.2M4.7 12H2.5M18.4 5.6l-1.6 1.6M7.2 16.8l-1.6 1.6M18.4 18.4l-1.6-1.6M7.2 7.2 5.6 5.6"/></g></svg>`;
                const moon = `<svg viewBox="0 0 24 24" fill="none"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a6.8 6.8 0 0 0 10.5 10.5z" fill="#B9C7E0"/></svg>`;
                const cloud = `<svg viewBox="0 0 24 24" fill="none"><path d="M7 18a4.5 4.5 0 0 1-.6-8.96 5.5 5.5 0 0 1 10.7-1.6A4 4 0 0 1 17 18H7z" fill="#9FB0CC"/></svg>`;
                const cloudSun = `<svg viewBox="0 0 24 24" fill="none"><circle cx="8" cy="9" r="3.4" fill="#F5C97B"/><path d="M9 19a4.5 4.5 0 0 1-.6-8.96 5.5 5.5 0 0 1 10.7-1.2A4 4 0 0 1 19 19H9z" fill="#9FB0CC"/></svg>`;
                const rain = `<svg viewBox="0 0 24 24" fill="none"><path d="M6.5 13.5a4 4 0 0 1-.4-7.98A5 5 0 0 1 15.7 4a3.6 3.6 0 0 1 1.3 6.98" fill="#9FB0CC"/><g stroke="#5FD0E8" stroke-width="1.7" stroke-linecap="round"><path d="M8 16.5 6.7 19.5M12.5 16.5 11.2 19.5M17 16.5 15.7 19.5"/></g></svg>`;
                const storm = `<svg viewBox="0 0 24 24" fill="none"><path d="M6.5 12.5a4 4 0 0 1-.4-7.98A5 5 0 0 1 15.7 3a3.6 3.6 0 0 1 1.3 6.98" fill="#8595B4"/><path d="M12.4 12.5 9.5 17h3l-1.6 4.5 5-6.3h-3.2l1.5-2.7z" fill="#F5C97B"/></svg>`;
                const snow = `<svg viewBox="0 0 24 24" fill="none"><path d="M6.5 13.5a4 4 0 0 1-.4-7.98A5 5 0 0 1 15.7 4a3.6 3.6 0 0 1 1.3 6.98" fill="#9FB0CC"/><g stroke="#EAF2FF" stroke-width="1.6" stroke-linecap="round"><path d="M8 16v4M6.2 17.2l3.6 1.6M9.8 17.2l-3.6 1.6"/><path d="M16 16v4M14.2 17.2l3.6 1.6M17.8 17.2l-3.6 1.6"/></g></svg>`;
                const fog = `<svg viewBox="0 0 24 24" fill="none"><g stroke="#9FB0CC" stroke-width="1.7" stroke-linecap="round"><path d="M4 9.5h13M4 13h16M4 16.5h11"/></g></svg>`;
                const t = (code || "").toString();
                const map = {
                    "1000": isDay ? sun : moon,
                    "1003": isDay ? cloudSun : cloud,
                    "1006": cloud, "1009": cloud,
                    "1030": fog, "1135": fog, "1147": fog,
                    "1063": rain, "1150": rain, "1153": rain, "1180": rain, "1183": rain, "1186": rain, "1189": rain, "1192": rain, "1195": rain, "1240": rain, "1243": rain, "1246": rain, "1198": rain, "1201": rain, "1204": rain, "1207": rain, "1249": rain, "1252": rain,
                    "1066": snow, "1114": snow, "1117": snow, "1210": snow, "1213": snow, "1216": snow, "1219": snow, "1222": snow, "1225": snow, "1255": snow, "1258": snow, "1279": snow, "1282": snow,
                    "1087": storm, "1273": storm, "1276": storm
                };
                return map[t] || cloud;
            }

            /* ---------------- SKY CANVAS ---------------- */
            const canvas = $("#skyCanvas");
            const ctx = canvas.getContext("2d");
            const hero = $("#hero");

            let currentBgNum = 1;

            const bgImageUrls = {
                "clear-day": "https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop",
                "clear-night": "https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=1200&auto=format&fit=crop",
                "cloud-sun": "https://images.unsplash.com/photo-1534088568595-a066f410bcda?q=80&w=1200&auto=format&fit=crop",
                "cloud-night": "https://images.unsplash.com/photo-1532074755146-5cd7216a6ecd?q=80&w=1200&auto=format&fit=crop",
                "cloud": "https://images.unsplash.com/photo-1483702721041-b23de737a886?q=80&w=1200&auto=format&fit=crop",
                "rain": "https://images.unsplash.com/photo-1428908728789-d2de25dbd4e2?q=80&w=1200&auto=format&fit=crop",
                "storm": "https://images.unsplash.com/photo-1605721911519-3dfeb3be25e7?q=80&w=1200&auto=format&fit=crop",
                "snow": "https://images.unsplash.com/photo-1491002052546-bf38f186af56?q=80&w=1200&auto=format&fit=crop",
                "fog": "https://images.unsplash.com/photo-1485236712207-0516004f06b4?q=80&w=1200&auto=format&fit=crop"
            };

            function bgImageFor(kind) {
                return bgImageUrls[kind] || bgImageUrls["cloud"];
            }

            let meteorState = { x: 0, y: 0, dx: 0, dy: 0, len: 0, spd: 0, active: false, delay: 120 };

            function resizeCanvas() {
                const r = hero.getBoundingClientRect();
                canvas.width = r.width * devicePixelRatio;
                canvas.height = r.height * devicePixelRatio;
                canvas.style.width = r.width + "px";
                canvas.style.height = r.height + "px";
                ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
            }
            window.addEventListener("resize", resizeCanvas);

            function classify(code, isDay) {
                const c = parseInt(code);
                if ([1087, 1273, 1276, 1279, 1282].includes(c)) return "storm";
                if ([1063, 1150, 1153, 1180, 1183, 1186, 1189, 1192, 1195, 1240, 1243, 1246, 1198, 1201, 1204, 1207, 1249, 1252].includes(c)) return "rain";
                if ([1066, 1114, 1117, 1210, 1213, 1216, 1219, 1222, 1225, 1255, 1258].includes(c)) return "snow";
                if ([1030, 1135, 1147].includes(c)) return "fog";
                if ([1006, 1009].includes(c)) return "cloud";
                if (c === 1003) return isDay ? "cloud-sun" : "cloud-night";
                return isDay ? "clear-day" : "clear-night";
            }

            function generateLightningBolt(w, h) {
                const segments = [];
                let curX = w * 0.3 + Math.random() * w * 0.5;
                let curY = 0;
                segments.push({ x: curX, y: curY });
                const splitAt = Math.floor(5 + Math.random() * 5);
                let branchIndex = -1;
                while (curY < h - 10) {
                    const stepY = 12 + Math.random() * 16;
                    const stepX = (Math.random() - 0.5) * 26;
                    curX += stepX;
                    curY += stepY;
                    segments.push({ x: curX, y: curY });
                    if (segments.length === splitAt) {
                        branchIndex = segments.length - 1;
                    }
                }
                if (branchIndex !== -1) {
                    const branch = [];
                    let bx = segments[branchIndex].x;
                    let by = segments[branchIndex].y;
                    branch.push({ x: bx, y: by });
                    while (by < h - 20) {
                        by += 10 + Math.random() * 12;
                        bx += (Math.random() - 0.35) * 22;
                        branch.push({ x: bx, y: by });
                    }
                    particleState.lightningBranch = branch;
                } else {
                    particleState.lightningBranch = null;
                }
                return segments;
            }

            function initParticles(kind, w, h) {
                const n = kind === "rain" ? 100 : kind === "storm" ? 120 : kind === "snow" ? 80 : kind === "fog" ? 6 : kind.includes("cloud") ? 5 : 40;
                const arr = [];
                for (let i = 0; i < n; i++) {
                    if (kind === "rain" || kind === "storm") {
                        arr.push({
                            x: Math.random() * w,
                            y: Math.random() * h,
                            len: 12 + Math.random() * 18,
                            spd: 8 + Math.random() * 6,
                            thickness: 0.8 + Math.random() * 0.8,
                            op: 0.25 + Math.random() * 0.35
                        });
                    } else if (kind === "snow") {
                        const depth = Math.random();
                        arr.push({
                            x: Math.random() * w,
                            y: Math.random() * h,
                            r: 1.0 + depth * 3.0,
                            spd: 0.4 + depth * 1.2,
                            sway: Math.random() * Math.PI * 2,
                            swaySpd: 0.01 + Math.random() * 0.02,
                            depth: depth
                        });
                    } else if (kind === "fog") {
                        arr.push({
                            x: Math.random() * w - w * 0.3,
                            y: h * 0.2 + Math.random() * h * 0.6,
                            w: w * 0.4 + Math.random() * w * 0.4,
                            h: 25 + Math.random() * 35,
                            spd: 0.12 + Math.random() * 0.18,
                            op: 0.04 + Math.random() * 0.06
                        });
                    } else if (kind.includes("cloud")) {
                        arr.push({
                            x: Math.random() * w,
                            y: h * 0.05 + Math.random() * h * 0.35,
                            w: 120 + Math.random() * 150,
                            h: 40 + Math.random() * 30,
                            spd: 0.05 + Math.random() * 0.1,
                            op: 0.08 + Math.random() * 0.1,
                            layer: Math.random() > 0.5 ? 1 : 0
                        });
                    } else if (kind === "clear-day") {
                        arr.push({
                            x: Math.random() * w,
                            y: Math.random() * h,
                            r: 0.8 + Math.random() * 1.5,
                            op: 0.1 + Math.random() * 0.4,
                            spd: 0.1 + Math.random() * 0.2,
                            sway: Math.random() * Math.PI * 2,
                            swaySpd: 0.005 + Math.random() * 0.01
                        });
                    } else {
                        arr.push({
                            x: Math.random() * w,
                            y: Math.random() * h * 0.8,
                            r: 0.6 + Math.random() * 1.2,
                            op: 0.2 + Math.random() * 0.6,
                            twSpd: 0.02 + Math.random() * 0.04,
                            twPhase: Math.random() * Math.PI * 2
                        });
                    }
                }
                return arr;
            }

            function setSky(code, isDay) {
                const kind = classify(code, isDay === 1 || isDay === true);
                resizeCanvas();
                const w = canvas.width / devicePixelRatio, h = canvas.height / devicePixelRatio;

                const targetImg = bgImageFor(kind);
                const bg1 = $("#heroBg1");
                const bg2 = $("#heroBg2");

                if (currentBgNum === 1) {
                    bg2.style.backgroundImage = `url(${targetImg})`;
                    gsap.killTweensOf(bg1);
                    gsap.killTweensOf(bg2);
                    gsap.to(bg1, { opacity: 0, duration: 1.2, ease: "power2.inOut" });
                    gsap.to(bg2, { opacity: 1, duration: 1.2, ease: "power2.inOut" });
                    currentBgNum = 2;
                } else {
                    bg1.style.backgroundImage = `url(${targetImg})`;
                    gsap.killTweensOf(bg1);
                    gsap.killTweensOf(bg2);
                    gsap.to(bg2, { opacity: 0, duration: 1.2, ease: "power2.inOut" });
                    gsap.to(bg1, { opacity: 1, duration: 1.2, ease: "power2.inOut" });
                    currentBgNum = 1;
                }

                particleState = { kind, particles: initParticles(kind, w, h), ripples: [], flashT: 0, t: 0 };
                if (rafId) cancelAnimationFrame(rafId);
                animateSky();
            }

            function animateSky() {
                const w = canvas.width / devicePixelRatio, h = canvas.height / devicePixelRatio;
                const { kind, particles } = particleState;
                particleState.t += 1;
                ctx.clearRect(0, 0, w, h);

                if (kind === "clear-day") {
                    const cx = w * 0.85, cy = h * 0.2;
                    const glowRadius = 140 + Math.sin(particleState.t * 0.02) * 15;
                    const rg = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowRadius);
                    rg.addColorStop(0, "rgba(255, 230, 160, 0.45)");
                    rg.addColorStop(0.2, "rgba(255, 210, 120, 0.2)");
                    rg.addColorStop(0.6, "rgba(255, 180, 80, 0.05)");
                    rg.addColorStop(1, "rgba(255, 180, 80, 0)");
                    ctx.fillStyle = rg;
                    ctx.fillRect(0, 0, w, h);

                    const fLineX = w * 0.2 - cx;
                    const fLineY = h * 0.8 - cy;
                    const lensFlares = [
                        { dist: 0.15, r: 8, color: "rgba(255, 255, 255, 0.2)" },
                        { dist: 0.35, r: 24, color: "rgba(255, 200, 100, 0.08)" },
                        { dist: 0.5, r: 12, color: "rgba(100, 200, 255, 0.06)" },
                        { dist: 0.7, r: 35, color: "rgba(255, 100, 255, 0.04)" },
                        { dist: 0.85, r: 18, color: "rgba(100, 255, 180, 0.05)" }
                    ];
                    lensFlares.forEach(lf => {
                        const fx = cx + fLineX * lf.dist;
                        const fy = cy + fLineY * lf.dist;
                        const gr = ctx.createRadialGradient(fx, fy, 0, fx, fy, lf.r);
                        gr.addColorStop(0, lf.color);
                        gr.addColorStop(0.8, lf.color);
                        gr.addColorStop(1, "rgba(0,0,0,0)");
                        ctx.fillStyle = gr;
                        ctx.beginPath();
                        ctx.arc(fx, fy, lf.r, 0, Math.PI * 2);
                        ctx.fill();
                    });

                    particles.forEach(p => {
                        p.y -= p.spd;
                        p.x += Math.sin(p.sway) * 0.15;
                        p.sway += p.swaySpd;
                        if (p.y < 0) {
                            p.y = h;
                            p.x = Math.random() * w;
                        }
                        const curOp = p.op * (0.3 + 0.7 * Math.abs(Math.sin(particleState.t * 0.01 + p.sway)));
                        ctx.globalAlpha = curOp;
                        ctx.fillStyle = "rgba(255, 245, 210, 0.8)";
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        ctx.fill();
                    });
                    ctx.globalAlpha = 1;

                } else if (kind === "clear-night") {
                    const cx = w * 0.82, cy = h * 0.18;
                    const rg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 140);
                    rg.addColorStop(0, "rgba(215, 230, 255, 0.18)");
                    rg.addColorStop(0.5, "rgba(215, 230, 255, 0.04)");
                    rg.addColorStop(1, "rgba(215, 230, 255, 0)");
                    ctx.fillStyle = rg;
                    ctx.fillRect(0, 0, w, h);

                    particles.forEach(p => {
                        const curOp = p.op * (0.2 + 0.8 * Math.abs(Math.sin(particleState.t * p.twSpd + p.twPhase)));
                        ctx.globalAlpha = curOp;
                        ctx.fillStyle = "#EEF4FF";
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        ctx.fill();
                    });

                    if (!meteorState.active) {
                        meteorState.delay -= 1;
                        if (meteorState.delay <= 0 && Math.random() < 0.015) {
                            meteorState.active = true;
                            meteorState.x = Math.random() * w * 0.6;
                            meteorState.y = Math.random() * h * 0.3;
                            meteorState.spd = 9 + Math.random() * 8;
                            meteorState.dx = meteorState.spd;
                            meteorState.dy = meteorState.spd * 0.65;
                            meteorState.len = 40 + Math.random() * 50;
                        }
                    } else {
                        ctx.globalAlpha = 0.85;
                        const grad = ctx.createLinearGradient(meteorState.x, meteorState.y, meteorState.x - meteorState.dx, meteorState.y - meteorState.dy);
                        grad.addColorStop(0, "rgba(255, 255, 255, 0.95)");
                        grad.addColorStop(0.4, "rgba(200, 220, 255, 0.65)");
                        grad.addColorStop(1, "rgba(200, 220, 255, 0)");
                        ctx.strokeStyle = grad;
                        ctx.lineWidth = 1.6;
                        ctx.beginPath();
                        ctx.moveTo(meteorState.x, meteorState.y);
                        ctx.lineTo(meteorState.x - meteorState.dx, meteorState.y - meteorState.dy);
                        ctx.stroke();

                        meteorState.x += meteorState.dx;
                        meteorState.y += meteorState.dy;

                        if (meteorState.x > w + 60 || meteorState.y > h + 60) {
                            meteorState.active = false;
                            meteorState.delay = 120 + Math.random() * 250;
                        }
                    }
                    ctx.globalAlpha = 1;

                } else if (kind === "cloud-sun" || kind === "cloud-night" || kind === "cloud") {
                    if (kind === "cloud-sun") {
                        const cx = w * 0.85, cy = h * 0.2;
                        const rg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 150);
                        rg.addColorStop(0, "rgba(255, 210, 120, 0.25)");
                        rg.addColorStop(1, "rgba(255, 210, 120, 0)");
                        ctx.fillStyle = rg;
                        ctx.fillRect(0, 0, w, h);
                    }
                    drawClouds(particles, w);

                } else if (kind === "rain" || kind === "storm") {
                    if (kind === "storm") {
                        particleState.flashT -= 1;
                        if (particleState.flashT <= 0 && Math.random() < 0.006) {
                            particleState.flashT = 10 + Math.random() * 8;
                            particleState.lightningBolt = generateLightningBolt(w, h);
                        }
                        if (particleState.flashT > 0) {
                            ctx.fillStyle = `rgba(240, 245, 255, ${Math.sin(particleState.flashT * 0.3) * 0.28})`;
                            ctx.fillRect(0, 0, w, h);

                            if (particleState.lightningBolt && particleState.flashT > 4) {
                                ctx.shadowColor = "rgba(173, 216, 230, 1)";
                                ctx.shadowBlur = 15;
                                ctx.strokeStyle = "rgba(255, 255, 255, 0.95)";
                                ctx.lineWidth = 2.2;
                                ctx.beginPath();
                                particleState.lightningBolt.forEach((pt, idx) => {
                                    if (idx === 0) ctx.moveTo(pt.x, pt.y);
                                    else ctx.lineTo(pt.x, pt.y);
                                });
                                ctx.stroke();

                                if (particleState.lightningBranch) {
                                    ctx.lineWidth = 1.1;
                                    ctx.beginPath();
                                    particleState.lightningBranch.forEach((pt, idx) => {
                                        if (idx === 0) ctx.moveTo(pt.x, pt.y);
                                        else ctx.lineTo(pt.x, pt.y);
                                    });
                                    ctx.stroke();
                                }
                                ctx.shadowBlur = 0;
                            }
                        }
                    }

                    const windSpeed = (currentData && currentData.current) ? currentData.current.wind_kph : 12;
                    const driftAngle = (windSpeed / 50) * 3.5;

                    ctx.strokeStyle = "rgba(180, 215, 245, 0.4)";
                    particles.forEach(p => {
                        ctx.lineWidth = p.thickness;
                        p.y += p.spd;
                        p.x += driftAngle;
                        if (p.y > h - 10) {
                            if (Math.random() < 0.22) {
                                particleState.ripples.push({
                                    x: p.x,
                                    y: h - 2 - Math.random() * 8,
                                    r: 1.5,
                                    maxR: 8 + Math.random() * 8,
                                    op: p.op * 0.8
                                });
                            }
                            p.y = -20;
                            p.x = Math.random() * w;
                        }
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p.x - driftAngle * 0.8, p.y + p.len);
                        ctx.stroke();
                    });

                    if (particleState.ripples) {
                        particleState.ripples.forEach((rp, idx) => {
                            rp.r += 0.6;
                            rp.op -= 0.035;
                            if (rp.op <= 0) {
                                particleState.ripples.splice(idx, 1);
                                return;
                            }
                            ctx.strokeStyle = `rgba(180, 220, 245, ${rp.op})`;
                            ctx.lineWidth = 0.7;
                            ctx.beginPath();
                            ctx.ellipse(rp.x, rp.y, rp.r, rp.r * 0.32, 0, 0, Math.PI * 2);
                            ctx.stroke();
                        });
                    }

                } else if (kind === "snow") {
                    const windSpeed = (currentData && currentData.current) ? currentData.current.wind_kph : 10;
                    const snowDrift = (windSpeed / 55) * 1.8;

                    particles.forEach(p => {
                        p.y += p.spd;
                        p.sway += p.swaySpd;
                        p.x += Math.sin(p.sway) * 0.4 + snowDrift;
                        if (p.y > h) {
                            p.y = -10;
                            p.x = Math.random() * w;
                        }

                        if (p.depth > 0.85) {
                            ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, p.r * 1.5, 0, Math.PI * 2);
                            ctx.fill();
                        }

                        ctx.fillStyle = "rgba(248, 250, 255, 0.9)";
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        ctx.fill();
                    });

                } else if (kind === "fog") {
                    particles.forEach(p => {
                        p.x += p.spd;
                        if (p.x > w + p.w) p.x = -p.w;

                        const g2 = ctx.createLinearGradient(p.x, 0, p.x + p.w, 0);
                        g2.addColorStop(0, "rgba(220,228,240,0)");
                        g2.addColorStop(0.35, `rgba(220,228,240,${p.op * 0.85})`);
                        g2.addColorStop(0.65, `rgba(220,228,240,${p.op})`);
                        g2.addColorStop(1, "rgba(220,228,240,0)");

                        ctx.fillStyle = g2;

                        ctx.beginPath();
                        ctx.ellipse(p.x + p.w / 2, p.y, p.w / 2, p.h / 2, 0, 0, Math.PI * 2);
                        ctx.fill();
                    });
                }

                rafId = requestAnimationFrame(animateSky);
            }

            function drawClouds(particles, w) {
                particles.forEach(p => {
                    p.x += p.spd;
                    if (p.x > w + p.w) p.x = -p.w;
                    ctx.fillStyle = `rgba(235, 240, 250, ${p.op})`;
                    ctx.beginPath();
                    ctx.ellipse(p.x, p.y, p.w * 0.5, p.h * 0.5, 0, 0, Math.PI * 2);
                    ctx.ellipse(p.x + p.w * 0.28, p.y + p.h * 0.08, p.w * 0.32, p.h * 0.4, 0, 0, Math.PI * 2);
                    ctx.ellipse(p.x - p.w * 0.28, p.y + p.h * 0.1, p.w * 0.3, p.h * 0.36, 0, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            /* ---------------- SEARCH ---------------- */
            const searchInput = $("#searchInput");
            const suggestBox = $("#suggestBox");
            let debounceT = null;

            searchInput.addEventListener("input", () => {
                clearTimeout(debounceT);
                const q = searchInput.value.trim();
                if (q.length < 2) { suggestBox.classList.remove("open"); return; }
                debounceT = setTimeout(() => doSearch(q), 260);
            });

            document.addEventListener("click", (e) => {
                if (!e.target.closest(".searchwrap")) suggestBox.classList.remove("open");
            });

            function getCityImageUrl(cityName, country) {
                const encoded = encodeURIComponent(`${cityName} ${country} city skyline landscape`);
                return `https://source.unsplash.com/200x200/?${encoded}`;
            }

            function countryToFlag(countryName) {
                const map = {
                    'United States of America': '🇺🇸', 'United Kingdom': '🇬🇧', 'France': '🇫🇷', 'Germany': '🇩🇪',
                    'Italy': '🇮🇹', 'Spain': '🇪🇸', 'Canada': '🇨🇦', 'Australia': '🇦🇺', 'Japan': '🇯🇵',
                    'China': '🇨🇳', 'India': '🇮🇳', 'Brazil': '🇧🇷', 'Mexico': '🇲🇽', 'Russia': '🇷🇺',
                    'South Korea': '🇰🇷', 'Turkey': '🇹🇷', 'Iraq': '🇮🇶', 'Iran': '🇮🇷', 'Egypt': '🇪🇬',
                    'Saudi Arabia': '🇸🇦', 'UAE': '🇦🇪', 'United Arab Emirates': '🇦🇪', 'Pakistan': '🇵🇰',
                    'Netherlands': '🇳🇱', 'Switzerland': '🇨🇭', 'Sweden': '🇸🇪', 'Norway': '🇳🇴',
                    'Denmark': '🇩🇰', 'Finland': '🇫🇮', 'Portugal': '🇵🇹', 'Greece': '🇬🇷',
                    'Argentina': '🇦🇷', 'Chile': '🇨🇱', 'Colombia': '🇨🇴', 'Peru': '🇵🇪',
                    'Thailand': '🇹🇭', 'Indonesia': '🇮🇩', 'Malaysia': '🇲🇾', 'Singapore': '🇸🇬',
                    'Philippines': '🇵🇭', 'Vietnam': '🇻🇳', 'South Africa': '🇿🇦', 'Nigeria': '🇳🇬',
                    'Kenya': '🇰🇪', 'Morocco': '🇲🇦', 'Poland': '🇵🇱', 'Ukraine': '🇺🇦',
                    'Czech Republic': '🇨🇿', 'Austria': '🇦🇹', 'Belgium': '🇧🇪', 'Ireland': '🇮🇪',
                    'New Zealand': '🇳🇿', 'Israel': '🇮🇱', 'Jordan': '🇯🇴', 'Lebanon': '🇱🇧',
                    'Kuwait': '🇰🇼', 'Qatar': '🇶🇦', 'Bahrain': '🇧🇭', 'Oman': '🇴🇲'
                };
                return map[countryName] || '🌍';
            }

            async function doSearch(q) {
                try {
                    const res = await fetch(`${BASE}/search.json?key=${API_KEY}&q=${encodeURIComponent(q)}`);
                    const list = await res.json();
                    if (!Array.isArray(list) || !list.length) { suggestBox.classList.remove("open"); return; }
                    suggestBox.innerHTML = list.slice(0, 5).map((c, i) => {
                        const imgUrl = getCityImageUrl(c.name, c.country);
                        const flag = countryToFlag(c.country);
                        const divider = i < Math.min(list.length, 5) - 1 ? '<div class="suggest-divider"></div>' : '';
                        return `<button class="suggest-item" data-q="${c.lat},${c.lon}">
                          <div class="s-thumb">
                            <div class="s-thumb-placeholder"><svg viewBox="0 0 24 24" fill="none"><path d="M12 21s7-6.6 7-12A7 7 0 1 0 5 9c0 5.4 7 12 7 12z" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="9" r="2.3" stroke="currentColor" stroke-width="1.8"/></svg></div>
                            <img src="${imgUrl}" alt="${c.name}" onload="this.classList.add('loaded')" onerror="this.style.display='none'" />
                          </div>
                          <div class="s-info">
                            <div class="s-city">${c.name}</div>
                            <div class="s-region">${c.region || ''}</div>
                            <div class="s-country">${flag} ${c.country}</div>
                          </div>
                          <div class="s-arrow"><svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
                        </button>${divider}`;
                    }).join("");
                    suggestBox.classList.add("open");
                    suggestBox.querySelectorAll(".suggest-item").forEach(btn => {
                        btn.addEventListener("click", () => {
                            searchInput.value = btn.querySelector(".s-city").textContent;
                            suggestBox.classList.remove("open");
                            loadWeather(btn.dataset.q);
                        });
                    });
                } catch (err) { /* silent */ }
            }

            searchInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter" && searchInput.value.trim()) {
                    suggestBox.classList.remove("open");
                    loadWeather(searchInput.value.trim());
                }
            });

            $("#geoBtn").addEventListener("click", () => {
                if (!navigator.geolocation) { flash("Location isn't available in this browser", true); return; }
                flash("Locating you…");
                navigator.geolocation.getCurrentPosition(
                    pos => loadWeather(`${pos.coords.latitude},${pos.coords.longitude}`),
                    () => flash("Location access denied", true)
                );
            });

            /* ---------------- UNIT TOGGLE ---------------- */
            $("#unitToggle").addEventListener("click", (e) => {
                const b = e.target.closest("button");
                if (!b) return;
                unit = b.dataset.unit;
                [...$("#unitToggle").children].forEach(c => c.classList.toggle("active", c === b));
                if (currentData) render(currentData);
            });

            /* ---------------- FETCH ---------------- */
            async function loadWeather(q) {
                try {
                    flash("Fetching latest conditions…");
                    const res = await fetch(`${BASE}/forecast.json?key=${API_KEY}&q=${encodeURIComponent(q)}&days=7&aqi=yes&alerts=no`);
                    if (!res.ok) throw new Error("bad response");
                    const data = await res.json();
                    if (data.error) throw new Error(data.error.message);
                    currentData = data;
                    render(data, true);
                } catch (err) {
                    flash("Couldn't find that place — try another search", true);
                }
            }

            /* ---------------- RENDER ---------------- */
            function t(v_c, v_f) { return Math.round(unit === "c" ? v_c : v_f); }

            function render(data, animate) {
                const { location, current, forecast } = data;
                const today = forecast.forecastday[0];

                $("#locName").textContent = `${location.name}${location.region && location.region !== location.name ? ", " + location.region : ""}`;
                const dt = new Date(location.localtime.replace(" ", "T"));
                $("#locMeta").textContent = `${location.country} · ${dt.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' })} · ${dt.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' })} local`;

                // temp counter
                const targetTemp = t(current.temp_c, current.temp_f);
                const proxy = { v: parseInt($("#tempMain").textContent) || 0 };
                gsap.to(proxy, {
                    v: targetTemp, duration: animate ? 1 : 0, ease: "power2.out", onUpdate: () => {
                        $("#tempMain").textContent = Math.round(proxy.v);
                    }
                });

                $("#condText").textContent = current.condition.text;
                $("#hiTemp").textContent = `H ${t(today.day.maxtemp_c, today.day.maxtemp_f)}°`;
                $("#loTemp").textContent = `L ${t(today.day.mintemp_c, today.day.mintemp_f)}°`;

                // AQI
                const aqi = current.air_quality;
                if (aqi) {
                    const idx = aqi["us-epa-index"];
                    const levels = ["", "Good", "Moderate", "Unhealthy for sensitive", "Unhealthy", "Very unhealthy", "Hazardous"];
                    const colors = ["", "#7BD08A", "#F5C97B", "#E5A15B", "#E5766B", "#B85AC9", "#8A3D5A"];
                    $("#aqiText").textContent = `Air quality — ${levels[idx] || "—"}`;
                    $("#aqiDot").style.background = colors[idx] || "#8DA3C4";
                }

                // quick chips
                $("#quickChips").innerHTML = `
      <div class="quickchip"><svg viewBox="0 0 24 24" fill="none"><path d="M12 3a4 4 0 0 1 4 4c0 2-1.5 3-1.5 5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M3 11h9a3 3 0 1 1-2 5.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>Wind <b>${unit === "c" ? Math.round(current.wind_kph) + " km/h" : Math.round(current.wind_mph) + " mph"}</b></div>
      <div class="quickchip"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2s6 7.5 6 12a6 6 0 1 1-12 0c0-4.5 6-12 6-12z" stroke="currentColor" stroke-width="1.8"/></svg>Humidity <b>${current.humidity}%</b></div>
      <div class="quickchip"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M12 7v5l3.5 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>Feels like <b>${t(current.feelslike_c, current.feelslike_f)}°</b></div>
      <div class="quickchip"><svg viewBox="0 0 24 24" fill="none"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="2.6" stroke="currentColor" stroke-width="1.8"/></svg>Visibility <b>${unit === "c" ? current.vis_km + " km" : Math.round(current.vis_km * 0.62) + " mi"}</b></div>
    `;

                // sky
                setSky(current.condition.code, current.is_day);

                renderHourly(forecast);
                renderDetails(current, today);
                renderDaily(forecast);

                if (animate) runEntranceAnim();
            }

            function renderHourly(forecast) {
                const now = new Date(forecast.forecastday[0].date + "T00:00:00");
                const nowH = new Date();
                let hours = [...forecast.forecastday[0].hour, ...forecast.forecastday[1].hour];
                hours = hours.filter(h => new Date(h.time) >= new Date(nowH.getTime() - 60 * 60 * 1000)).slice(0, 24);

                $("#hourlyStrip").innerHTML = hours.map(h => {
                    const hd = new Date(h.time);
                    const label = hd.getHours() === nowH.getHours() && hd.getDate() === nowH.getDate() ? "Now" : hd.toLocaleTimeString(undefined, { hour: 'numeric' });
                    return `<div class="hour-card">
        <div class="h-time">${label}</div>
        <div class="h-icon">${iconFor(h.condition.code, h.is_day)}</div>
        <div class="h-temp">${t(h.temp_c, h.temp_f)}°</div>
        <div class="h-rain">${h.chance_of_rain > 0 ? h.chance_of_rain + "%" : ""}</div>
      </div>`;
                }).join("");
            }

            function renderDetails(current, today) {
                const uvColor = current.uv < 3 ? "#7BD08A" : current.uv < 6 ? "#F5C97B" : current.uv < 8 ? "#E5A15B" : "#E5766B";
                const uvPct = Math.min(100, (current.uv / 11) * 100);
                const humPct = current.humidity;
                const pressurePct = Math.min(100, Math.max(0, ((current.pressure_mb - 980) / (1040 - 980)) * 100));
                const windDeg = current.wind_degree || 0;

                $("#detailGrid").innerHTML = `
      <div class="gauge-card">
        <div class="g-label"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2s6 7.5 6 12a6 6 0 1 1-12 0c0-4.5 6-12 6-12z" stroke="currentColor" stroke-width="1.8"/></svg>Humidity</div>
        <div class="g-value">${current.humidity}<span>%</span></div>
        <div class="bar-track"><div class="bar-fill" style="background:var(--cyan)" data-w="${humPct}"></div></div>
        <div class="g-sub">Dew point ${t(current.dewpoint_c || current.temp_c - 3, current.dewpoint_f || current.temp_f - 5)}°</div>
      </div>

      <div class="gauge-card">
        <div class="g-label"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="1.8"/><path d="M12 2v2M12 20v2M22 12h-2M4 12H2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>UV Index</div>
        <div class="g-value" style="color:${uvColor}">${current.uv}</div>
        <div class="bar-track"><div class="bar-fill" style="background:${uvColor}" data-w="${uvPct}"></div></div>
        <div class="g-sub">${current.uv < 3 ? "Low exposure" : current.uv < 6 ? "Moderate exposure" : current.uv < 8 ? "High — use protection" : "Very high — take care"}</div>
      </div>

      <div class="gauge-card">
        <div class="g-label"><svg viewBox="0 0 24 24" fill="none"><path d="M12 3a4 4 0 0 1 4 4c0 2-1.5 3-1.5 5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M3 11h9a3 3 0 1 1-2 5.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>Wind</div>
        <div class="wind-row">
          <div>
            <div class="g-value">${unit === "c" ? Math.round(current.wind_kph) : Math.round(current.wind_mph)}<span>${unit === "c" ? "km/h" : "mph"}</span></div>
            <div class="g-sub">${current.wind_dir} · gusts ${unit === "c" ? Math.round(current.gust_kph) : Math.round(current.gust_mph)}</div>
          </div>
          <div class="wind-compass"><div class="needle" data-deg="${windDeg}"></div></div>
        </div>
      </div>

      <div class="gauge-card">
        <div class="g-label"><svg viewBox="0 0 24 24" fill="none"><rect x="4" y="3" width="16" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M8 8h8M8 12h8M8 16h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>Pressure</div>
        <div class="g-value">${Math.round(current.pressure_mb)}<span>mb</span></div>
        <div class="bar-track"><div class="bar-fill" style="background:var(--halo)" data-w="${pressurePct}"></div></div>
        <div class="g-sub">${current.pressure_mb > 1013 ? "Rising / stable" : "Falling — change likely"}</div>
      </div>
    `;

                gsap.utils.toArray("#detailGrid .bar-fill").forEach(el => {
                    gsap.fromTo(el, { width: "0%" }, { width: el.dataset.w + "%", duration: 1, ease: "power3.out", delay: 0.15 });
                });
                const needle = document.querySelector(".needle");
                if (needle) {
                    gsap.fromTo(needle, { rotate: 0 }, { rotate: needle.dataset.deg + "deg", duration: 1, ease: "power3.out", transformOrigin: "50% 100%" });
                }
            }

            function renderDaily(forecast) {
                const days = forecast.forecastday;
                const allTemps = days.flatMap(d => [d.day.mintemp_c, d.day.maxtemp_c]);
                const gMin = Math.min(...allTemps), gMax = Math.max(...allTemps);

                $("#dailyList").innerHTML = days.map((d, i) => {
                    const dd = new Date(d.date + "T00:00:00");
                    const name = i === 0 ? "Today" : dd.toLocaleDateString(undefined, { weekday: 'short' });
                    const dateS = dd.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
                    const left = ((d.day.mintemp_c - gMin) / (gMax - gMin || 1)) * 100;
                    const width = ((d.day.maxtemp_c - d.day.mintemp_c) / (gMax - gMin || 1)) * 100;
                    return `<div class="day-row">
        <div class="d-name"><b>${name}</b>${dateS}</div>
        <div class="d-icon">${iconFor(d.day.condition.code, 1)}</div>
        <div class="day-range"><i data-l="${left}" data-w="${width}"></i></div>
        <div class="d-temps"><span class="hi">${t(d.day.maxtemp_c, d.day.maxtemp_f)}°</span> <span class="lo">${t(d.day.mintemp_c, d.day.mintemp_f)}°</span></div>
      </div>`;
                }).join("");

                gsap.utils.toArray("#dailyList .day-range i").forEach(el => {
                    gsap.fromTo(el, { width: "0%", left: el.dataset.l + "%" }, { width: el.dataset.w + "%", duration: 0.9, ease: "power3.out", delay: 0.1 });
                });
            }

            function runEntranceAnim() {
                const tl = gsap.timeline();
                tl.fromTo(".loc-block", { y: -10, opacity: 0 }, { y: 0, opacity: 1, duration: .5, ease: "power2.out" })
                    .fromTo(".aqi-pill", { y: -10, opacity: 0 }, { y: 0, opacity: 1, duration: .5, ease: "power2.out" }, "<")
                    .fromTo(".cond-block", { y: 14, opacity: 0 }, { y: 0, opacity: 1, duration: .55, ease: "power2.out" }, "-=0.2")
                    .fromTo(".hero-bottom .quickchip", { y: 14, opacity: 0 }, { y: 0, opacity: 1, duration: .45, stagger: 0.06, ease: "power2.out" }, "-=0.3")
                    .fromTo("#hourlyStrip .hour-card", { y: 16, opacity: 0 }, { y: 0, opacity: 1, duration: .4, stagger: 0.03, ease: "power2.out" }, "-=0.25")
                    .fromTo("#detailGrid .gauge-card", { y: 16, opacity: 0 }, { y: 0, opacity: 1, duration: .45, stagger: 0.05, ease: "power2.out" }, "-=0.3")
                    .fromTo("#dailyList .day-row", { x: 10, opacity: 0 }, { x: 0, opacity: 1, duration: .4, stagger: 0.04, ease: "power2.out" }, "-=0.35");
            }

            /* card hover tilt */
            document.addEventListener("mousemove", (e) => {
                const card = e.target.closest(".hour-card, .gauge-card");
                if (!card) return;
                const r = card.getBoundingClientRect();
                const px = (e.clientX - r.left) / r.width - 0.5;
                const py = (e.clientY - r.top) / r.height - 0.5;
                gsap.to(card, { rotateX: py * -6, rotateY: px * 6, duration: .4, ease: "power2.out", transformPerspective: 400 });
            });
            document.addEventListener("mouseout", (e) => {
                const card = e.target.closest(".hour-card, .gauge-card");
                if (card) gsap.to(card, { rotateX: 0, rotateY: 0, duration: .5, ease: "power2.out" });
            });

            /* header entrance */
            gsap.fromTo("header.top", { y: -16, opacity: 0 }, { y: 0, opacity: 1, duration: .6, ease: "power2.out" });

            /* initial load — resolve by IP location */
            loadWeather("auto:ip");
        })();
    </script>
</body>

</html>
